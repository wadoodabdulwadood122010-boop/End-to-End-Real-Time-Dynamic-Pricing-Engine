<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Pricing Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-8">
        <div class="border-b border-slate-700 pb-5 mb-6">
            <h1 class="text-3xl font-extrabold text-indigo-400">Dynamic Pricing Engine</h1>
            <p class="text-slate-400 text-sm mt-1">Real-time inference UI utilizing production staging models.</p>
        </div>

        <form id="pricingForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Number of Past Rides</label>
                <input type="number" name="Number_of_Past_Rides" value="13" required class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Average Rating (0.0 - 5.0)</label>
                <input type="number" step="0.01" name="Average_Ratings" value="4.47" required class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Expected Ride Duration (mins)</label>
                <input type="number" name="Expected_Ride_Duration" value="90" required class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Location Category</label>
                <select name="Location_Category" class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                    <option value="Urban">Urban</option>
                    <option value="Suburban">Suburban</option>
                    <option value="Rural">Rural</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Customer Loyalty Status</label>
                <select name="Customer_Loyalty_Status" class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                    <option value="Silver">Silver</option>
                    <option value="Regular">Regular</option>
                    <option value="Gold">Gold</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Time of Booking</label>
                <select name="Time_of_Booking" class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                    <option value="Night">Night</option>
                    <option value="Evening">Evening</option>
                    <option value="Afternoon">Afternoon</option>
                    <option value="Morning">Morning</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-300 mb-2">Vehicle Type</label>
                <select name="Vehicle_Type" class="w-full bg-slate-950 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                    <option value="Premium">Premium</option>
                    <option value="Economy">Economy</option>
                </select>
            </div>

            <div class="mt-4">
                <div class="flex justify-between mb-2">
                    <label class="block text-sm font-medium text-slate-300">Number of Riders</label>
                    <span id="ridersLabel" class="text-sm font-bold text-indigo-400">90</span>
                </div>
                <input type="range" name="Number_of_Riders" min="1" max="500" value="90" 
                       oninput="document.getElementById('ridersLabel').innerText = this.value"
                       class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            </div>

            <div class="mt-4">
                <div class="flex justify-between mb-2">
                    <label class="block text-sm font-medium text-slate-300">Number of Drivers</label>
                    <span id="driversLabel" class="text-sm font-bold text-indigo-400">45</span>
                </div>
                <input type="range" name="Number_of_Drivers" min="1" max="500" value="45" 
                       oninput="document.getElementById('driversLabel').innerText = this.value"
                       class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            </div>

        </form>

        <div id="resultBox" class="mt-8 p-6 bg-slate-900 border border-emerald-500/40 rounded-xl transition duration-300">
            <p class="text-sm text-slate-400 font-medium uppercase tracking-wider">Estimated Historical Cost</p>
            <h2 id="costOutput" class="text-4xl font-black text-emerald-400 mt-1">Calculating...</h2>
        </div>
    </div>

    <script>
        const form = document.getElementById('pricingForm');
        const costOutput = document.getElementById('costOutput');

        // Function to handle the prediction fetch
        async function fetchPrediction() {
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    costOutput.innerText = `$${result.predicted_historical_cost}`;
                } else {
                    console.error("Error processing inference: " + result.message);
                    costOutput.innerText = "Error";
                }
            } catch (err) {
                console.error("Could not reach prediction endpoint.", err);
                costOutput.innerText = "Connection Failed";
            }
        }

        // Trigger prediction whenever any input changes
        form.addEventListener('input', fetchPrediction);

        // Run an initial calculation when the page loads
        document.addEventListener('DOMContentLoaded', fetchPrediction);
    </script>
</body>
</html>
